---
# ==========================================
# PostgreSQL PersistentVolumeClaim
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: pativar
  labels:
    app: postgres
    app.kubernetes.io/part-of: pativar
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard  # Adjust based on your cluster

---
# ==========================================
# PostgreSQL ConfigMap (init script)
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: pativar
data:
  init.sql: |
    -- This will be populated from schema.sql
    -- In production, use a migration tool or init container
    SELECT 1;

---
# ==========================================
# PostgreSQL Service
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pativar
  labels:
    app: postgres
    app.kubernetes.io/part-of: pativar
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres

---
# ==========================================
# PostgreSQL StatefulSet
# ==========================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: pativar
  labels:
    app: postgres
    app.kubernetes.io/part-of: pativar
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: pativar
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pativar-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pativar-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pativar-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pativar
                - -d
                - pativar
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pativar
                - -d
                - pativar
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
