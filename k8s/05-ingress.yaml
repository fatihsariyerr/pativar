---
# ==========================================
# Ingress - Route traffic to frontend & API
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pativar-ingress
  namespace: pativar
  labels:
    app.kubernetes.io/part-of: pativar
  annotations:
    # Nginx Ingress Controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # Let's Encrypt (cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pativar.example.com  # Replace with your domain
      secretName: pativar-tls
  rules:
    - host: pativar.example.com  # Replace with your domain
      http:
        paths:
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pativar-api
                port:
                  number: 3001
          # Upload routes
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: pativar-api
                port:
                  number: 3001
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pativar-frontend
                port:
                  number: 3000

---
# ==========================================
# NetworkPolicy - DB only accessible by API
# ==========================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-access
  namespace: pativar
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: pativar-api
      ports:
        - protocol: TCP
          port: 5432

---
# ==========================================
# NetworkPolicy - API accessible by frontend & ingress
# ==========================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-access
  namespace: pativar
spec:
  podSelector:
    matchLabels:
      app: pativar-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: pativar-frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
